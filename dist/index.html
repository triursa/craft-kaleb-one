<!DOCTYPE html>
<html lang="en" data-theme="obsidian" data-domain="craft">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craft — kaleb.one</title>
<meta name="theme-color" content="#11151C">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A0%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://theme.kaleb.one/dist/theme-obsidian.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Georgia:wght@400;600;700&display=swap');

:root {
  /* M3 Obsidian base tokens from theme-obsidian.css */
  /* Per-domain accent override for Craft (amber/warm) */
  --md-sys-color-primary: #f59e0b;
  --md-sys-color-on-primary: #1a1a1d;
  --md-sys-color-primary-container: rgba(245,158,11,0.15);

  /* Semantic/signal colors (NOT theme tokens — preserved) */
  --accent: #f59e0b;
  --accent-dim: #d97706;
  --accent-glow: rgba(245,158,11,0.15);
  --border-accent: rgba(245,158,11,0.3);

  /* Shorthand aliases for M3 tokens (used throughout styles) */
  --bg: var(--md-sys-color-surface);
  --surface: var(--md-sys-color-surface-container-low);
  --surface-2: var(--md-sys-color-surface-container);
  --surface-3: var(--md-sys-color-surface-container-high);
  --border: var(--md-sys-color-outline-variant);
  --text: var(--md-sys-color-on-surface);
  --text-dim: var(--md-sys-color-on-surface-variant);
  --text-muted: var(--md-sys-color-outline);
  --radius: var(--md-sys-shape-corner-large);
  --radius-sm: var(--md-sys-shape-corner-medium);
  --shadow: var(--md-sys-elevation-3);
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-serif: 'Georgia', 'Times New Roman', serif;
  --mono: 'JetBrains Mono', 'DM Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-ambient {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(245,158,11,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(217,119,6,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(245,158,11,0.03) 0%, transparent 70%);
}

.container {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto; padding: 32px 24px;
}

/* Hero */
.hero {
  text-align: center; padding: 48px 24px 32px; margin-bottom: 40px;
}
.hero-icon { font-size: 48px; margin-bottom: 16px; }
.hero-title {
  font-family: var(--font-serif); font-size: 42px; font-weight: 700;
  line-height: 1.2; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-sub { font-size: 16px; color: var(--text-dim); font-weight: 400; max-width: 600px; margin: 0 auto; }
.hero-count {
  display: inline-block; margin-top: 12px; padding: 6px 16px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px;
  font-size: 13px; color: var(--accent); font-weight: 500;
}

/* Glass */
.glass {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: border-color 0.3s, background 0.3s;
}

/* Article Cards */
.articles { display: flex; flex-direction: column; gap: 16px; }

.article-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.3s, background 0.3s;
  cursor: pointer;
}
.article-card:hover { border-color: var(--border-accent); }
.article-card.active { border-color: var(--accent); }

.article-header {
  padding: 20px 24px;
  display: flex; align-items: flex-start; gap: 16px;
}
.article-emoji {
  font-size: 28px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface-3); border-radius: 12px;
  flex-shrink: 0;
}
.article-meta { flex: 1; }
.article-title {
  font-family: var(--font-serif); font-size: 20px; font-weight: 600;
  margin-bottom: 4px; color: var(--text);
}
.article-excerpt {
  font-size: 14px; color: var(--text-dim); line-height: 1.5;
}
.article-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.tag {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  background: var(--accent-glow); color: var(--accent);
}
.tag-infra { background: rgba(59,130,246,0.12); color: #60a5fa; }
.tag-cicd { background: rgba(16,185,129,0.12); color: #34d399; }
.tag-ssg { background: rgba(168,85,247,0.12); color: #a78bfa; }
.tag-d1 { background: rgba(236,72,153,0.12); color: #ec4899; }
.tag-design { background: rgba(245,158,11,0.12); color: #f59e0b; }
.tag-agent { background: rgba(6,182,212,0.12); color: #06b6d4; }
.tag-pattern { background: rgba(245,158,11,0.12); color: #d97706; }

.article-chevron {
  font-size: 18px; color: var(--text-muted);
  transition: transform 0.3s;
  flex-shrink: 0; margin-top: 12px;
}
.article-card.active .article-chevron { transform: rotate(180deg); color: var(--accent); }

.article-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
  border-top: 0 solid var(--border);
}
.article-card.active .article-body {
  max-height: 5000px; padding: 0 24px 24px;
  border-top: 1px solid var(--border);
}

.article-body h2 {
  font-family: var(--font-serif); font-size: 22px; font-weight: 600;
  margin: 24px 0 12px; padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.article-body h2:first-child { margin-top: 0; border-top: none; padding-top: 0; }

.article-body h3 {
  font-size: 16px; font-weight: 600; color: var(--accent-dim);
  margin: 16px 0 8px;
}

.article-body p { font-size: 15px; line-height: 1.7; color: var(--text-dim); margin-bottom: 12px; }
.article-body ul, .article-body ol { margin: 8px 0 16px 24px; }
.article-body li { font-size: 15px; line-height: 1.7; color: var(--text-dim); margin-bottom: 4px; }

.article-body pre {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; margin: 12px 0; overflow-x: auto;
}
.article-body code {
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
  color: var(--accent);
}
.article-body pre code { color: var(--text-dim); }

.article-body strong { color: var(--text); font-weight: 600; }
.article-body em { color: var(--accent); font-style: italic; }

.article-body a { color: var(--accent); text-decoration: none; }
.article-body a:hover { text-decoration: underline; }

.article-body code:not(pre code) {
  background: var(--surface-3); padding: 2px 6px; border-radius: 4px;
  font-size: 13px;
}

/* Tables */
.article-body table {
  width: 100%; border-collapse: collapse; margin: 12px 0 16px;
  font-size: 14px;
}
.article-body th {
  text-align: left; padding: 10px 12px; font-weight: 600;
  border-bottom: 2px solid var(--border); color: var(--text);
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.article-body td {
  padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-dim);
}
.article-body tr:hover td { background: var(--surface-2); }

/* TOC */
.article-toc {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.toc-link {
  font-size: 12px; padding: 4px 10px; border-radius: 12px;
  background: var(--surface-2); color: var(--text-muted); cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.toc-link:hover { background: var(--accent-glow); color: var(--accent); }

/* Back link */
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--text-muted); text-decoration: none;
  margin-bottom: 24px; transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }

/* Footer */
.footer {
  text-align: center; padding: 32px 0 16px;
  font-size: 12px; color: var(--text-muted);
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.5s ease forwards; }

/* Search */
.search-bar {
  position: relative; margin-bottom: 24px;
}
.search-input {
  width: 100%; padding: 14px 20px 14px 48px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 15px; font-family: var(--font-sans);
  outline: none; transition: border-color 0.3s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
  font-size: 18px; color: var(--text-muted);
}

/* Category filters */
.categories {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  justify-content: center;
}
.cat-btn {
  padding: 6px 16px; border-radius: 20px; font-size: 13px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  font-family: var(--font-sans);
}
.cat-btn:hover { border-color: var(--border-accent); color: var(--text); }
.cat-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
</style>
</head>

<script>
// ─── Article Data ─────────────────────────────────────────────────────────
const ARTICLES = [{"slug": "cicd-pipeline-patterns", "title": "CI/CD Pipeline Patterns", "emoji": "⚙", "tags": [""], "excerpt": "Every `*.kaleb.one` app follows the same CI/CD pattern:", "headings": ["The Cross-Repo Dispatch Architecture", "Required Secrets (Per App Repo)", "The Wrangler Binary Trap", "Sparse Checkout Silences `git add`", "Push ≠ Deploy"], "body_html": "<h1>⚙️ CI/CD Pipeline Patterns<\/h1>\n<h2>The Cross-Repo Dispatch Architecture<\/h2>\n<p>Every <code>*.kaleb.one<\/code> app follows the same CI/CD pattern:<\/p>\n<p><pre><code class=\"\">second-brain-vault (source)\n    push to domains/&lt;domain&gt;/**\n        ↓\ntrigger-&lt;domain&gt;-rebuild.yml (vault workflow)\n        ↓ repository_dispatch event\n&lt;domain&gt;-kaleb-one (build repo)\n        ↓\ncheckout vault + app repo\n        ↓\npython3 scripts/build.py\n        ↓\nnpx wrangler pages deploy\n<\/code><\/pre><\/p>\n<h2>Required Secrets (Per App Repo)<\/h2>\n<table><tr><th>Secret<\/th><th>Purpose<\/th><th>Source<\/th><\/tr>\n<tr><td><code>REPO_PAT<\/code><\/td><td>Cross-repo checkout + dispatch<\/td><td>GitHub PAT with <code>repo<\/code> scope<\/td><\/tr>\n<tr><td><code>CLOUDFLARE_API_TOKEN<\/code><\/td><td>Pages deployment<\/td><td>1Password \"Global Cloudflare Token\"<\/td><\/tr>\n<tr><td><code>CLOUDFLARE_ACCOUNT_ID<\/code><\/td><td>Account scoping<\/td><td>Hard-coded: <code>e500dc74dca67189444bf0af0b54c39d<\/code><\/td><\/tr>\n<tr><td>Domain-specific keys<\/td><td>e.g., <code>TMDB_KEY<\/code>, <code>GOOGLE_BOOKS_KEY<\/code><\/td><td>Per-service API keys<\/td><\/tr><\/table>\n<h2>The Wrangler Binary Trap<\/h2>\n<p>The <code>cloudflare/wrangler-action<\/code> GitHub Action downloads a <strong>121MB <code>workerd<\/code> binary<\/strong> into the working directory. If your workflow does <code>git add -A<\/code> after the build step, this binary gets committed and exceeds GitHub's 100MB file size limit, permanently blocking pushes.<\/p>\n<strong>Fix:<\/strong> Either <code>.gitignore<\/code> the binary, or only push specific files. Never <code>git add -A<\/code> after a Wrangler deploy step.\n<h2>Sparse Checkout Silences <code>git add<\/code><\/h2>\n<p>When the vault repo uses sparse checkout (which it does in CI), <code>git add<\/code> silently skips files outside the sparse cone. This means:<\/p>\n<ul>\n<li>✅ <code>git add .github/workflows/trigger-foo-rebuild.yml<\/code> — <strong>fails silently<\/strong> if sparse checkout is active<\/li>\n<li>Fix: <code>git sparse-checkout disable<\/code> before <code>git add<\/code> for files outside the cone<\/li>\n<li>Re-enable after: <code>git sparse-checkout set domains/<domain><\/code><\/li>\n<\/ul>\n<h2>Push ≠ Deploy<\/h2>\n<p>Pushing to the app repo's <code>main<\/code> branch does <strong>not<\/strong> trigger a Cloudflare Pages rebuild unless you've set up direct GitHub integration (which we haven't). The standard pattern relies on <code>repository_dispatch<\/code> from the vault repo.<\/p>\n<p>For manual rebuilds:\n<pre><code class=\"bash\">gh workflow run build-deploy.yml --repo triursa/&lt;domain&gt;-kaleb-one\n<\/code><\/pre><\/p>"}, {"slug": "cloudflare-token-triage", "title": "Cloudflare Token Triage", "emoji": "🔑", "tags": [""], "excerpt": "The kaleb.one infrastructure uses two distinct Cloudflare tokens stored in 1Password:", "headings": ["The Two-Token System", "Common Failure Modes", "The Rate Limit Protocol", "The 522 Checklist", "Apex Domain A-Record Trap"], "body_html": "<h1>🔑 Cloudflare Token Triage<\/h1>\n<h2>The Two-Token System<\/h2>\n<p>The kaleb.one infrastructure uses two distinct Cloudflare tokens stored in 1Password:<\/p>\n<table><tr><th>Token<\/th><th>1Password Path<\/th><th>Scope<\/th><th>Use For<\/th><\/tr>\n<tr><td><strong>Cloudflare<\/strong><\/td><td><code>op://Developer/Cloudflare/credential<\/code><\/td><td>DNS write<\/td><td>Creating CNAME/A records, zone management<\/td><\/tr>\n<tr><td><strong>Global Cloudflare Token<\/strong><\/td><td><code>op://Developer/Global Cloudflare Token/credential<\/code><\/td><td>Pages/Access/Workers<\/td><td>Creating Pages projects, deploying, Access apps, Workers<\/td><\/tr><\/table>\n<h2>Common Failure Modes<\/h2>\n<h3>Silent Auth Failure<\/h3>\n<p>Using the DNS-only token for Pages operations returns <code>403<\/code> with no helpful error message. The token <em>exists<\/em> and <em>works<\/em> for DNS — it just silently refuses everything else. Always check which token you're using before making calls.<\/p>\n<h3><code>/tokens/verify<\/code> Is Misleading<\/h3>\n<p>The <code>/client/v4/user/tokens/verify<\/code> endpoint confirms a token is <em>valid<\/em>, not that it has the <em>right permissions<\/em>. A valid DNS token will pass verification then fail on Access operations.<\/p>\n<h3>Wrangler Auth Fragmentation<\/h3>\n<code>npx wrangler<\/code> sometimes calls <code>/memberships<\/code> and sometimes doesn't. Setting only <code>CLOUDFLARE_API_TOKEN<\/code> causes intermittent auth failures. Always set both:\n<p><pre><code class=\"bash\">CLOUDFLARE_API_TOKEN=\"$CF_TOKEN\" \\\nCLOUDFLARE_ACCOUNT_ID=\"$CF_ACCOUNT_ID\" \\\nnpx wrangler pages deploy ...\n<\/code><\/pre><\/p>\n<h2>The Rate Limit Protocol<\/h2>\n<p>Cloudflare's 971 error is account-level — switching tokens doesn't help:<\/p>\n<ol>\n<li>Space calls 2–3 seconds apart<\/li>\n<li>Pause 60–90 seconds after every 5–10 calls<\/li>\n<li>On 971/429: <strong>stop all CF calls for 20+ minutes<\/strong><\/li>\n<li>Every failed probe during cooldown resets the timer<\/li>\n<li>After a burst of 10+ calls, cool down 20+ min before continuing<\/li>\n<\/ol>\n<h2>The 522 Checklist<\/h2>\n<p>Three causes only:<\/p>\n<ol>\n<li><strong>Zero deployments<\/strong> — project exists but has no content<\/li>\n<li><strong>Missing custom domain<\/strong> — CNAME works but domain not in Pages project settings<\/li>\n<li><strong>Unproxied DNS<\/strong> — orange cloud is off on the CNAME record<\/li>\n<\/ol>\n<p>Fix all three, 522 disappears. There are no other causes.<\/p>\n<h2>Apex Domain A-Record Trap<\/h2>\n<p>When deploying to a root domain (e.g., <code>kaleb.one<\/code>, not a subdomain), pre-existing A records pointing to old hosts take precedence over the Pages CNAME. Always check for and delete stale A records before adding the CNAME.<\/p>"}, {"slug": "d1-access-api-patterns", "title": "D1 & Access-Gated API Patterns", "emoji": "🔒", "tags": [""], "excerpt": "Cloudflare D1's Hono integration has a critical limitation: `db.exec()` with multi-statement SQL fails silently or throws errors. Never do this:", "headings": ["D1: One Statement Per `db.prepare()`", "Access-Gated JSON Returns HTML", "Google OAuth Redirect URI"], "body_html": "<h1>🔒 D1 & Access-Gated API Patterns<\/h1>\n<h2>D1: One Statement Per <code>db.prepare()<\/code><\/h2>\n<p>Cloudflare D1's Hono integration has a critical limitation: <code>db.exec()<\/code> with multi-statement SQL fails silently or throws errors. Never do this:<\/p>\n<p><pre><code class=\"javascript\">// ❌ Broken — multi-statement exec\nawait db.exec(`\n  CREATE TABLE IF NOT EXISTS items (id INTEGER PRIMARY KEY, name TEXT);\n  INSERT INTO items (name) VALUES ('example');\n`);\n<\/code><\/pre><\/p>\n<p>Always use <code>db.prepare(...).run()<\/code> per statement:<\/p>\n<p><pre><code class=\"javascript\">// ✅ Correct — one statement per prepare\nawait db.prepare(\"CREATE TABLE IF NOT EXISTS items (id INTEGER PRIMARY KEY, name TEXT)\").run();\nawait db.prepare(\"INSERT INTO items (name) VALUES ('example')\").run();\n<\/code><\/pre><\/p>\n<h2>Access-Gated JSON Returns HTML<\/h2>\n<p>When a Cloudflare Pages site is behind Zero Trust Access, any <code>fetch()<\/code> to <code>manifest.json<\/code>, <code>enrichment.json<\/code>, or API endpoints returns the HTML login page instead of JSON data. The frontend throws <code>SyntaxError: Unexpected token '<'<\/code>.<\/p>\n<strong>Solutions:<\/strong>\n<ol>\n<li><strong>Inline JSON into HTML<\/strong> — embed the data as a <code><script><\/code> tag or JS variable in the page itself, avoiding separate fetches<\/li>\n<li><strong>Exempt public paths<\/strong> — configure Access policies to skip <code>/public/*<\/code> or <code>/api/health<\/code> paths<\/li>\n<li><strong>Use <code>cf-access-client-id<\/code><\/strong> — for programmatic access between services, use Service Auth tokens that bypass the login page<\/li>\n<\/ol>\n<p>The inline approach is preferred for static sites — it eliminates an extra network request and avoids the Access gate entirely.<\/p>\n<h2>Google OAuth Redirect URI<\/h2>\n<p>When setting up Google OAuth for a Cloudflare Pages app (like wish.kaleb.one), the redirect URI must match exactly:<\/p>\n<p><pre><code class=\"\">https://&lt;subdomain&gt;.kaleb.one/api/auth/callback\n<\/code><\/pre><\/p>\n<p>Common mistakes:\n<ul>\n<li>Using <code>http://<\/code> instead of <code>https://<\/code><\/li>\n<li>Omitting the <code>/api<\/code> prefix<\/li>\n<li>Using <code>localhost<\/code> in production credentials<\/li>\n<\/ul><\/p>\n<p>The Google Cloud Console requires the exact URI — no wildcards, no trailing slashes.<\/p>"}, {"slug": "liquid-glass-specification", "title": "Liquid Glass Aesthetic Specification", "emoji": "🪟", "tags": [""], "excerpt": "The visual design system shared across all `*.kaleb.one` apps.", "headings": ["CSS Variables", "Domain Accents", "Glass Panel Pattern", "Typography Rules", "Animation", "Ambient Backgrounds"], "body_html": "<h1>🪟 Liquid Glass Aesthetic Specification<\/h1>\n<p>The visual design system shared across all <code>*.kaleb.one<\/code> apps.<\/p>\n<h2>CSS Variables<\/h2>\n<p><pre><code class=\"css\">:root {\n  --bg: #0a0e17;\n  --surface: rgba(255,255,255,0.04);\n  --surface-2: rgba(255,255,255,0.07);\n  --surface-3: rgba(255,255,255,0.10);\n  --border: rgba(255,255,255,0.08);\n  --border-accent: rgba(6,182,212,0.3); /* per-domain accent */\n  --text: #e2e8f0;\n  --text-dim: #94a3b8;\n  --text-muted: #64748b;\n  --accent: #06b6d4; /* changes per domain */\n  --accent-dim: #0891b2;\n  --accent-glow: rgba(6,182,212,0.15);\n  --radius: 16px;\n  --radius-sm: 10px;\n  --shadow: 0 4px 24px rgba(0,0,0,0.3);\n  --font-sans: 'Inter', -apple-system, sans-serif;\n  --font-serif: 'Georgia', 'Times New Roman', serif;\n  --blur: 20px;\n}\n<\/code><\/pre><\/p>\n<h2>Domain Accents<\/h2>\n<table><tr><th>Domain<\/th><th>Accent Color<\/th><th>Hex<\/th><\/tr>\n<tr><td>Watch<\/td><td>Amber<\/td><td><code>#fbbf24<\/code><\/td><\/tr>\n<tr><td>Kitchen<\/td><td>Orange<\/td><td><code>#fb923c<\/code><\/td><\/tr>\n<tr><td>Masks<\/td><td>Violet<\/td><td><code>#a78bfa<\/code><\/td><\/tr>\n<tr><td>Brain<\/td><td>Blue<\/td><td><code>#60a5fa<\/code><\/td><\/tr>\n<tr><td>Read<\/td><td>Emerald<\/td><td><code>#34d399<\/code><\/td><\/tr>\n<tr><td>World<\/td><td>Pink<\/td><td><code>#f472b6<\/code><\/td><\/tr>\n<tr><td>Music<\/td><td>Hot Pink<\/td><td><code>#ec4899<\/code><\/td><\/tr>\n<tr><td>Projects<\/td><td>Green<\/td><td><code>#10b981<\/code><\/td><\/tr>\n<tr><td>Flow<\/td><td>Cyan<\/td><td><code>#06b6d4<\/code><\/td><\/tr>\n<tr><td>Craft<\/td><td>Amber-Orange<\/td><td><code>#f59e0b<\/code><\/td><\/tr><\/table>\n<h2>Glass Panel Pattern<\/h2>\n<p><pre><code class=\"css\">.glass {\n  background: var(--surface);\n  backdrop-filter: blur(var(--blur));\n  -webkit-backdrop-filter: blur(var(--blur));\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  padding: 24px;\n  transition: border-color 0.3s, background 0.3s;\n}\n.glass:hover {\n  border-color: var(--border-accent);\n  background: var(--surface-2);\n}\n<\/code><\/pre><\/p>\n<h2>Typography Rules<\/h2>\n<ul>\n<li><strong>Headings (H1):<\/strong> <code>font-family: var(--font-serif)<\/code>, bold, gradient text (<code>background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text;<\/code>)<\/li>\n<li><strong>Section titles:<\/strong> <code>font-family: var(--font-serif)<\/code>, 22px, with accent bar (3px wide vertical bar in domain color)<\/li>\n<li><strong>Body text:<\/strong> <code>font-family: var(--font-sans)<\/code>, 14-16px, <code>color: var(--text-dim)<\/code><\/li>\n<li><strong>Labels/captions:<\/strong> <code>font-size: 12-13px<\/code>, <code>text-transform: uppercase<\/code>, <code>letter-spacing: 1px<\/code>, <code>color: var(--text-muted)<\/code><\/li>\n<\/ul>\n<h2>Animation<\/h2>\n<p><pre><code class=\"css\">@keyframes fadeIn {\n  from { opacity: 0; transform: translateY(8px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.fade-in { animation: fadeIn 0.5s ease forwards; }\n.fade-in-d1 { animation-delay: 0.1s; opacity: 0; }\n.fade-in-d2 { animation-delay: 0.2s; opacity: 0; }\n.fade-in-d3 { animation-delay: 0.3s; opacity: 0; }\n.fade-in-d4 { animation-delay: 0.4s; opacity: 0; }\n<\/code><\/pre><\/p>\n<h2>Ambient Backgrounds<\/h2>\n<p>Each domain uses a unique radial gradient combination for its <code>.bg-ambient<\/code> layer. The gradients shift color when the active domain changes, creating a subtle atmospheric effect.<\/p>"}, {"slug": "ssg-markdown-parsing", "title": "SSG Markdown Parsing Patterns", "emoji": "📝", "tags": [""], "excerpt": "Hard-won lessons from building Python static site generators that read Obsidian vault markdown.", "headings": ["H2 Regex: Always Use Negative Lookahead", "H1 Lines Are Dense Combo Blocks", "Wiki-Links Break Markdown Tables", "Frontmatter Is Optional", "Bold-Line Values Are Template Defaults", "Task Phase Extraction"], "body_html": "<h1>📝 SSG Markdown Parsing Patterns<\/h1>\n<p>Hard-won lessons from building Python static site generators that read Obsidian vault markdown.<\/p>\n<h2>H2 Regex: Always Use Negative Lookahead<\/h2>\n<p>When splitting vault content into <code>##<\/code> sections, the regex <code>r\"^##\\s+(.+)$\"<\/code> will match <code>### <\/code> (h3) sub-headers as false section breaks.<\/p>\n<strong>Correct:<\/strong>\n<pre><code class=\"python\">r\"^##(?!#)\\s+(.+)$\"\n<\/code><\/pre>\n<p>The <code>(?!#)<\/code> prevents <code>###<\/code> from being captured. Without it, h3 headings inside a section (e.g., <code>### Setup Phase<\/code> inside <code>## Tasks<\/code>) create spurious entries.<\/p>\n<h2>H1 Lines Are Dense Combo Blocks<\/h2>\n<p>Vault recipe files cram multiple metadata fields on a single H1 line:\n<pre><code class=\"\"># Spicy Chicken Bowls Serves: 4 Cook: Ninja Crispi Gout-Friendly ★★★★☆ Liver-Friendly ★★★☆☆\n<\/code><\/pre><\/p>\n<p>The <code>Cook:<\/code> regex must stop before <code>Gout<\/code> appears:\n<pre><code class=\"python\">r'Cook:\\s*(.+?)(?:\\s+Gout|$)'\n<\/code><\/pre><\/p>\n<p>Without the <code>(?:\\s+Gout|$)<\/code> boundary, <code>Cook:<\/code> captures everything after it including the star ratings.<\/p>\n<h2>Wiki-Links Break Markdown Tables<\/h2>\n<p>Obsidian uses <code>[[slug|Display Text]]<\/code> syntax where <code>|<\/code> is a pipe separator. But <code>|<\/code> is also the markdown table column separator. <strong>Always protect wiki-link pipes before table parsing:<\/strong><\/p>\n<p><pre><code class=\"python\">protected = text\nwhile True:\n    m = re.search(r\"\\[\\[([^\\]]*?)\\|([^\\]]*?)\\]\\]\", protected)\n    if not m:\n        break\n    protected = protected[:m.start()] + \"[[\" + m.group(1) + \"§\" + m.group(2) + \"]]\" + protected[m.end():]\n\n# Parse table...\n# Then restore:\ncells = [c.replace(\"§\", \"|\") for c in cells]\n<\/code><\/pre><\/p>\n<h2>Frontmatter Is Optional<\/h2>\n<p>Some vault files (e.g., <code>health-notes.md<\/code>, <code>CONTEXT.md<\/code>) have no YAML frontmatter at all. The parser must:\n<ol>\n<li>Check if the file starts with <code>---<\/code><\/li>\n<li>If no frontmatter, use the filename as the title<\/li>\n<li>Treat the entire file as body content<\/li>\n<\/ol><\/p>\n<p>Never assume frontmatter exists.<\/p>\n<h2>Bold-Line Values Are Template Defaults<\/h2>\n<p>Many vault files start with:\n<pre><code class=\"markdown\">**Serves:** 2 | **Calories:** ~400 per serving\n<\/code><\/pre><\/p>\n<p>These are template placeholders, not real data. The actual values come from:\n<ul>\n<li>The H1 line (for serves, cook method)<\/li>\n<li>The <code>## Nutrition<\/code> section (for detailed breakdowns)<\/li>\n<\/ul><\/p>\n<p>Always prefer structured sections over bold-line prefix values.<\/p>\n<h2>Task Phase Extraction<\/h2>\n<p>When splitting task content by <code>r\"\\n###\\s+\"<\/code>, the first element is the heading text itself. Clean it with:\n<pre><code class=\"python\">re.sub(r\"^#+\\s*\", \"\", raw_phase)\n<\/code><\/pre><\/p>\n<p>This strips any residual <code>###<\/code> prefix before using it as a phase name.<\/p>"}, {"slug": "sovereign-mesh-orchestration", "title": "Sovereign Mesh & Agent Orchestration", "emoji": "🕸", "tags": [""], "excerpt": "The pattern for AI agent collaboration around an Obsidian vault via GitHub PRs.", "headings": ["The Mesh Flow", "Key Principles", "Manifest Structure", "Agent Spawning Protocol", "Integration Points"], "body_html": "<h1>🕸️ Sovereign Mesh & Agent Orchestration<\/h1>\n<p>The pattern for AI agent collaboration around an Obsidian vault via GitHub PRs.<\/p>\n<h2>The Mesh Flow<\/h2>\n<p><pre><code class=\"\">User Stream → Director (Hermes) → Hydrate Agent → GitHub PR → Vault\n                                      ↓\n                                 Read manifest\n                                 Scope vault context\n                                 Spawn sub-agent\n                                 Open PR with changes\n                                      ↓\n                                 Human reviews → Merge\n                                      ↓\n                                 Vault push → CI/CD triggers downstream rebuilds\n<\/code><\/pre><\/p>\n<h2>Key Principles<\/h2>\n<ol>\n<li><strong>No agent writes directly to <code>master<\/code>.<\/strong> All changes flow through GitHub pull requests.<\/li>\n<li><strong>Hydration over instruction.<\/strong> Agents read their manifest (skills, context, constraints) from the registry before acting.<\/li>\n<li><strong>Sub-agents are isolated.<\/strong> Each spawned agent gets its own conversation, terminal session, and context. Intermediate tool results never pollute the parent's context window.<\/li>\n<li><strong>PRs are the contract.<\/strong> A PR describes what changed and why. Human review is mandatory before merge.<\/li>\n<\/ol>\n<h2>Manifest Structure<\/h2>\n<p>Each agent in the registry has:\n<ul>\n<li><strong>Skills<\/strong> — which operating procedures to load<\/li>\n<li><strong>Context<\/strong> — which vault domains, repos, or APIs to access<\/li>\n<li><strong>Constraints<\/strong> — what the agent cannot do (e.g., \"never merge own PRs\")<\/li>\n<\/ul><\/p>\n<h2>Agent Spawning Protocol<\/h2>\n<ol>\n<li><code>delegate_task<\/code> with a clear goal, context, and toolsets<\/li>\n<li>Sub-agent loads required skills, reads relevant vault files<\/li>\n<li>Executes the task in isolation<\/li>\n<li>Returns a summary (not raw tool output)<\/li>\n<li>If changes are needed, opens a PR — never pushes to <code>master<\/code><\/li>\n<\/ol>\n<h2>Integration Points<\/h2>\n<ul>\n<li><strong>MemPalace<\/strong> — high-fidelity verbatim memory across sessions<\/li>\n<li><strong>GitHub MCP<\/strong> — PR creation, review, and merge<\/li>\n<li><strong>Cloudflare<\/strong> — deployment verification<\/li>\n<li><strong>Second-Brain Vault<\/strong> — content source and destination<\/li>\n<\/ul>"}, {"slug": "domain-app-hub-architecture", "title": "The Domain-App-Hub Architecture", "emoji": "🏛", "tags": [""], "excerpt": "The proven pattern for every `*.kaleb.one` app. Each one is a self-contained unit with identical structure.", "headings": ["The Pipeline", "Key Principles", "Deployment Steps (Bare-Metal)", "The Hub Launcher (kaleb.one Root)", "Current Deployments"], "body_html": "<h1>🏛️ The Domain-App-Hub Architecture<\/h1>\n<p>The proven pattern for every <code>*.kaleb.one<\/code> app. Each one is a self-contained unit with identical structure.<\/p>\n<h2>The Pipeline<\/h2>\n<p><pre><code class=\"\">second-brain-vault/domains/&lt;domain&gt;/   ← source of truth (markdown)\n         ↓\nscripts/build.py                        ← Python SSG (parses vault, generates HTML)\n         ↓\n/tmp/&lt;domain&gt;-site/                     ← generated static HTML + CSS + JS\n         ↓\nCloudflare Pages                        ← Wrangler deploy\n         ↓\n&lt;subdomain&gt;.kaleb.one                   ← CNAME proxied + Zero Trust Access\n<\/code><\/pre><\/p>\n<h2>Key Principles<\/h2>\n<ol>\n<li><strong>The build script reads the vault; it never writes to it.<\/strong> The vault is the source of truth. All transformations are one-way.<\/li>\n<li><strong>Each app gets its own GitHub repo.<\/strong> <code>triursa/<domain>-kaleb-one<\/code>. No monorepos.<\/li>\n<li><strong>The vault triggers rebuilds.<\/strong> Push to <code>domains/<domain>/**<\/code> → <code>repository_dispatch<\/code> → app repo builds.<\/li>\n<li><strong>Liquid Glass aesthetic.<\/strong> Every app uses: <code>backdrop-filter: blur()<\/code>, translucent panels, soft gradients, <code>Inter<\/code> (sans-serif) + <code>Georgia<\/code> (serif) typography.<\/li>\n<li><strong>Zero Trust Access.<\/strong> Every app is behind CF Access with specific email allowlists (usually <code>kaleb.bays@gmail.com<\/code> + <code>melindajean16@gmail.com<\/code>).<\/li>\n<\/ol>\n<h2>Deployment Steps (Bare-Metal)<\/h2>\n<ol>\n<li>Create CF Pages project: <code>POST /accounts/{id}/pages/projects<\/code><\/li>\n<li>Add DNS CNAME: <code>POST /zones/{id}/dns_records<\/code> (DNS token)<\/li>\n<li>Add custom domain to Pages: <code>POST /accounts/{id}/pages/projects/{name}/domains<\/code> (Global token)<\/li>\n<li>Create Zero Trust Access app + policies: <code>POST /accounts/{id}/access/apps<\/code><\/li>\n<li>Build locally: <code>VAULT_DIR=... python3 scripts/build.py<\/code><\/li>\n<li>Deploy: <code>npx wrangler pages deploy /tmp/<domain>-site --project-name=<name> --branch=main<\/code><\/li>\n<li>Verify: <code>https://<subdomain>.kaleb.one<\/code> → Access login → site renders<\/li>\n<\/ol>\n<h2>The Hub Launcher (kaleb.one Root)<\/h2>\n<p>The root domain serves as a public game launcher with:\n<ul>\n<li>Vertical sidebar with emoji icons per domain<\/li>\n<li>Per-domain accent colors that shift the entire page<\/li>\n<li>Hover preview before committing to a domain<\/li>\n<li>Keyboard shortcuts (1-9 for domain selection)<\/li>\n<li>No Zero Trust — intentionally public<\/li>\n<\/ul><\/p>\n<p>Adding a new domain to the hub requires:\n<ol>\n<li>CSS: Add <code>.bg-ambient[data-domain=\"<name>\"]<\/code> gradient<\/li>\n<li>HTML: Add <code>.bg-ambient[data-domain=\"<name>\"]<\/code> div in <code>.bg-layer<\/code><\/li>\n<li>HTML: Add <code>.sidebar-icon<\/code> div with <code>data-domain<\/code>, <code>data-accent<\/code>, <code>data-href<\/code><\/li>\n<li>JS: Add domain entry to <code>domains<\/code> object with name, desc, href, stats, etc.<\/li>\n<li>JS: Update <code>keys<\/code> array for keyboard navigation<\/li>\n<li>JS: Update keyboard hint text (<code>1-8<\/code> → <code>1-9<\/code> etc.)<\/li>\n<\/ol><\/p>\n<h2>Current Deployments<\/h2>\n<table><tr><th>Subdomain<\/th><th>Pages Project<\/th><th>Vault Path<\/th><th>Repo<\/th><th>Access<\/th><\/tr>\n<tr><td><code>kaleb.one<\/code><\/td><td><code>kaleb-one<\/code><\/td><td>— (static)<\/td><td><code>triursa/hub-kaleb-one<\/code><\/td><td>Public<\/td><\/tr>\n<tr><td><code>kitchen.kaleb.one<\/code><\/td><td><code>kitchen<\/code><\/td><td><code>domains/cooking/<\/code><\/td><td><code>triursa/kitchen-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>masks.kaleb.one<\/code><\/td><td><code>masks-wiki<\/code><\/td><td>(wiki content)<\/td><td>(separate)<\/td><td>kaleb<\/td><\/tr>\n<tr><td><code>brain.kaleb.one<\/code><\/td><td><code>brain<\/code><\/td><td>(note domains)<\/td><td><code>triursa/brain-kaleb-one<\/code><\/td><td>kaleb<\/td><\/tr>\n<tr><td><code>watchtower.kaleb.one<\/code><\/td><td><code>watchtower<\/code><\/td><td>— (Hermes data)<\/td><td>—<\/td><td>kaleb<\/td><\/tr>\n<tr><td><code>wish.kaleb.one<\/code><\/td><td><code>wish<\/code><\/td><td><code>domains/wishlist/<\/code> + D1<\/td><td><code>triursa/wish-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>vault.kaleb.one<\/code><\/td><td><code>vault<\/code><\/td><td>— (media)<\/td><td><code>triursa/vault-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>watch.kaleb.one<\/code><\/td><td><code>watch<\/code><\/td><td><code>domains/entertainment/<\/code><\/td><td><code>triursa/watch-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>read.kaleb.one<\/code><\/td><td><code>read<\/code><\/td><td><code>domains/books/<\/code><\/td><td><code>triursa/read-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>music.kaleb.one<\/code><\/td><td><code>music-kaleb-one<\/code><\/td><td><code>domains/music/<\/code><\/td><td>— (static)<\/td><td>kaleb + melinda<\/td><\/tr>\n<tr><td><code>projects.kaleb.one<\/code><\/td><td><code>projects<\/code><\/td><td><code>domains/projects/<\/code><\/td><td><code>triursa/projects-kaleb-one<\/code><\/td><td>kaleb<\/td><\/tr>\n<tr><td><code>flow.kaleb.one<\/code><\/td><td><code>flow<\/code><\/td><td>multi-domain<\/td><td><code>triursa/flow-kaleb-one<\/code><\/td><td>kaleb + melinda<\/td><\/tr><\/table>"}];
const GENERATED = "2026-05-04T02:24:27.841847Z";

// ─── Category Map ────────────────────────────────────────────────────────
const TAG_CATEGORIES = {
  'cloudflare': 'Infrastructure', 'infrastructure': 'Infrastructure',
  'cicd': 'CI/CD', 'github-actions': 'CI/CD',
  'ssg': 'Parsing', 'markdown': 'Parsing', 'parsing': 'Parsing',
  'd1': 'APIs & Data', 'access': 'APIs & Data', 'api': 'APIs & Data',
  'design': 'Design', 'css': 'Design', 'aesthetic': 'Design',
  'agents': 'Agents', 'mesh': 'Agents', 'architecture': 'Architecture', 'patterns': 'Architecture'
};

function getCategory(tags) {
  for (const tag of tags) {
    if (TAG_CATEGORIES[tag]) return TAG_CATEGORIES[tag];
  }
  return 'Other';
}

// ─── Render ───────────────────────────────────────────────────────────────
let activeId = null;
let filterCat = null;
let searchQuery = '';

function render() {
  let filtered = ARTICLES;
  if (filterCat) {
    filtered = filtered.filter(a => getCategory(a.tags) === filterCat);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.excerpt.toLowerCase().includes(q) ||
      a.tags.some(t => t.toLowerCase().includes(q))
    );
  }

  const categories = [...new Set(ARTICLES.map(a => getCategory(a.tags)))];

  const html = `
  <section class="hero fade-in">
    <div class="hero-icon">🛠️</div>
    <h1 class="hero-title">Craft</h1>
    <p class="hero-sub">Operating procedures & hard-won knowledge from building the kaleb.one ecosystem</p>
    <div class="hero-count">${ARTICLES.length} entries</div>
  </section>

  <div class="search-bar fade-in">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search" placeholder="Search craft knowledge..." value="${searchQuery}" oninput="handleSearch(this.value)">
  </div>

  <div class="categories fade-in">
    <button class="cat-btn ${!filterCat ? 'active' : ''}" onclick="filterCategory(null)">All</button>
    ${categories.map(cat => `
      <button class="cat-btn ${filterCat === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>
    `).join('')}
  </div>

  <div class="articles">
    ${filtered.length > 0 ? filtered.map(article => `
      <div class="article-card ${activeId === article.slug ? 'active' : ''}" onclick="toggleArticle('${article.slug}')">
        <div class="article-header">
          <div class="article-emoji">${article.emoji || '📋'}</div>
          <div class="article-meta">
            <div class="article-title">${article.title}</div>
            <div class="article-excerpt">${article.excerpt}</div>
            <div class="article-tags">
              ${article.tags.map(tag => {
                const cssClass = ['cloudflare','infrastructure'].includes(tag) ? 'tag-infra' :
                  ['cicd','github-actions'].includes(tag) ? 'tag-cicd' :
                  ['ssg','markdown','parsing'].includes(tag) ? 'tag-ssg' :
                  ['d1','access','api'].includes(tag) ? 'tag-d1' :
                  ['design','css','aesthetic'].includes(tag) ? 'tag-design' :
                  ['agents','mesh'].includes(tag) ? 'tag-agent' :
                  ['architecture','patterns'].includes(tag) ? 'tag-pattern' : '';
                return `<span class="tag ${cssClass}">${tag}</span>`;
              }).join('')}
            </div>
          </div>
          <div class="article-chevron">▼</div>
        </div>
        <div class="article-body" id="body-${article.slug}">
          ${article.headings.length > 0 ? `
            <div class="article-toc">
              ${article.headings.map(h => `<span class="toc-link">${h}</span>`).join('')}
            </div>
          ` : ''}
          ${article.body_html}
        </div>
      </div>
    `).join('') : `
      <div style="text-align:center;padding:48px;color:var(--text-muted)">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <div style="font-size:16px">No entries match your search</div>
      </div>
    `}
  </div>

  <div class="footer">
    craft.kaleb.one · Distilled from ${ARTICLES.length} sessions of breaking things and fixing them · <a href="https://kaleb.one">← Hub</a>
  </div>
  `;

  document.getElementById('app').innerHTML = html;

  // Restore search focus
  const searchEl = document.getElementById('search');
  if (searchEl && searchQuery) {
    searchEl.focus();
    searchEl.setSelectionRange(searchQuery.length, searchQuery.length);
  }
}

function toggleArticle(slug) {
  if (activeId === slug) {
    activeId = null;
  } else {
    activeId = slug;
  }
  render();
  if (activeId) {
    setTimeout(() => {
      const el = document.getElementById('body-' + slug);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

function filterCategory(cat) {
  filterCat = cat;
  activeId = null;
  render();
}

function handleSearch(value) {
  searchQuery = value;
  activeId = null;
  render();
}

// ─── Init ─────────────────────────────────────────────────────────────
const data = typeof ARTICLES === 'string' ? JSON.parse(ARTICLES) : ARTICLES;
ARTICLES = data;
render();
</script>
</body>
</html>
